<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>For My Love ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            font-family: Arial, sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(0,0,0,0.5);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            background: white;
            color: #ff4e8a;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4e8a;
            color: white;
        }

        #hiddenMessage {
            margin-top: 20px;
            display: none;
            font-size: 17px;
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            bottom: -10px;
            color: white;
            font-size: 20px;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-800px); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>I'm Sorry ❤️</h1>
    <p>Hey My Love,</p>
    <p>I know you're upset... and I truly hate seeing you sad.</p>
    <button onclick="showLove()">Open My Heart</button>

    <div id="hiddenMessage">
        You mean everything to me.  
        I’m really sorry for hurting you.  
        Please forgive me… I love you more than words can say. 💖  
        – Yours Forever
    </div>
</div>

<script>
    function showLove() {
        document.getElementById("hiddenMessage").style.display = "block";
    }

    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
